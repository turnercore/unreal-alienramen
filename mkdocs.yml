site_name: "Alien Ramen Documentation"
site_description: "Alien Ramen UE5.7 C++ and gameplay docs"
docs_dir: Documentation
site_dir: site
repo_name: alienramen
site_url: https://turnercore.github.io/unreal-alienramen/
# repo_url can be set later; left blank intentionally to avoid guessing

nav:
  - Home: README.md
  - GAS:
      - GAS Overview: README_GAS.md
      - GAS Blueprint Attributes: README_GAS_Blueprint_Attributes.md
  - Save System: README_SaveSubsystem.md
  - Dialogue & NPC: README_DialogueNPC.md
  - C++ Overview:
      - Overview: CppOverview/README.md
      - Enemy Base: CppOverview/AAREnemyBase.md
      - Enemy AI Controller: CppOverview/AAREnemyAIController.md
      - Invader Data Types: CppOverview/InvaderDataTypes.md
      - Invader Director Settings: CppOverview/UARInvaderDirectorSettings.md
      - Invader Director Subsystem: CppOverview/UARInvaderDirectorSubsystem.md
      - Invader Runtime State Component: CppOverview/UARInvaderRuntimeStateComponent.md
      - Enemy Utilities: CppOverview/EnemyUtilities.md
      - Invader Authoring Panel: CppOverview/Editor_SInvaderAuthoringPanel.md
      - Editor Settings: CppOverview/Editor_Settings.md
  - API Reference (Doxygen): API-Reference.md

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: default
      primary: deep purple
      accent: lime
    - scheme: slate
      primary: deep purple
      accent: lime
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - doxygen:
      packages:
        - doxygen:
            url: .
            config: Doxyfile

markdown_extensions:
  - admonition
  - attr_list
  - toc:
      permalink: true
  - footnotes
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
